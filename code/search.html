<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Search</title>
    <!-- <link rel="stylesheet" href="css/style.css"> -->
    <script src="https://d3js.org/d3.v7.min.js" charset="utf-8"></script>

</head>

<body>
    <a href="../index.html">Back</a>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search for a movie...">
        <ul id="suggestions"></ul>
    </div>

    <div class="slidecontainer" style="display: none;" id="slider">
        <input type="range" min="0" max="100" value="50" class="slider" id="myRange"></input>
        <p>Rating: <span id="demo"></span></p>
    </div>

    <div class="buttoncontainer" style="display: none;" id="enterButton">
        <button id="enter">Enter</button>
    </div>

    <div id="movie-info" style="background-color: antiquewhite;"></div>
    <div id="chart" style="display: none; background-color: antiquewhite;"></div>

    <script>
        let allMovies = [];
        let selectedMovie = null;

        d3.csv("../data/mini_movieratings.csv").then(function (data) {
            allMovies = data;
        });

        const input = d3.select("#search-input");
        const userRating = d3.select("#user-rating");
        const suggestionsList = d3.select("#suggestions");
        const movieInfo = d3.select("#movie-info");

        input.on("input", function () {
            const searchTerm = this.value.toLowerCase();

            if (searchTerm.length === 0) {
                suggestionsList.html("");
                return;
            }

            const matches = allMovies.filter(d =>
                d.movie_title.toLowerCase().includes(searchTerm)
            ).slice(0, 10);

            suggestionsList.html("");
            suggestionsList.selectAll("li")
                .data(matches)
                .enter()
                .append("li")
                .append("a")
                .style("cursor", "pointer")
                .text(d => d.movie_title)
                .on("click", function (evt, d) {
                    suggestionsList.html("");
                    userRating.html("What would you rate this movie out of 100?")

                    d3.select("#slider").style("display", "block");

                    const slider = document.getElementById('myRange');
                    const output = document.getElementById('demo');

                    output.innerHTML = slider.value;

                    slider.oninput = function () {
                        output.innerHTML = this.value;
                    }

                    selectedMovie = d;  // Store the movie                                                                                                                    
                    d3.select("#enterButton").style("display", "block");

                    document.getElementById("enter").onclick = function () {
                        const userRate = +document.getElementById('myRange').value;
                        selectMovie(selectedMovie, userRate);
                    }
                    //                                                                                                     
                });
        });



        function selectMovie(movie, userRate) {
            input.property("value", movie.movie_title);
            suggestionsList.html("");

            movieInfo.style("display", "block")
                .html(`                                                                                                                                           
              <h2>${movie.movie_title}</h2>      
              <p>${movie.movie_info}</p>                                                                                                           
              <p><strong>Genre:</strong> ${movie.genre}</p>                                                                                                 
              <p><strong>Tomatometer:</strong> ${movie.tomatometer_rating}%</p>                                                                             
              <p><strong>Audience Rating:</strong> ${movie.audience_rating}%</p>                                                                            
          `);

            // Show and update chart                                                                                                                              
            d3.select("#chart").style("display", "block");
            updateBarChart(+movie.tomatometer_rating, +movie.audience_rating, userRate);
        }

        d3.select("body").on("click", function (evt) {
            if (!evt.target.closest(".search-container")) {
                suggestionsList.html("");
            }
        });

        const margin = { top: 30, right: 30, bottom: 50, left: 60 };
        const chartWidth = 400 - margin.left - margin.right;
        const chartHeight = 300 - margin.top - margin.bottom;

        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", chartWidth + margin.left + margin.right)
            .attr("height", chartHeight + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        function updateBarChart(tomatometer, audience, userRating) {
            svg.selectAll("*").remove();

            const data = [
                { label: "Tomatometer", value: tomatometer },
                { label: "Audience", value: audience },
                { label: "Your Rating", value: userRating }
            ];

            const x = d3.scaleBand()
                .domain(data.map(d => d.label))
                .range([0, chartWidth])
                .padding(0.3);

            const y = d3.scaleLinear()
                .domain([0, 100])
                .range([chartHeight, 0]);

            svg.append("g")
                .attr("transform", `translate(0,${chartHeight})`)
                .call(d3.axisBottom(x));

            svg.append("g")
                .call(d3.axisLeft(y));

            svg.selectAll("rect")
                .data(data)
                .enter()
                .append("rect")
                .attr("x", d => x(d.label))
                .attr("y", d => y(d.value))
                .attr("width", x.bandwidth())
                .attr("height", d => chartHeight - y(d.value))
                .attr("fill", (d, i) => ["#e74c3c", "#3498db", "#2ecc71"][i]);

            svg.selectAll(".label")
                .data(data)
                .enter()
                .append("text")
                .attr("x", d => x(d.label) + x.bandwidth() / 2)
                .attr("y", d => y(d.value) - 5)
                .attr("text-anchor", "middle")
                .text(d => d.value);
        } 
    </script>

</body>

</html>
